<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: "微软雅黑", sans-serif;
      background: #f5f7fa;
      margin: 0;
    }
    h3 {
      margin: 0 0 12px;
      color: #1a3c5e;
      font-size: 14px;
      text-align: center;
    }

    /* 状态区 */
    #statusBox {
      background: #fff;
      border: 1px solid #dde3ec;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 12px;
      color: #555;
      margin-bottom: 10px;
      min-height: 48px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #statusIcon { font-size: 20px; flex-shrink: 0; }
    #statusText { line-height: 1.5; }

    /* 文书列表 */
    #docList {
      background: #fff;
      border: 1px solid #dde3ec;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 10px;
      max-height: 180px;
      overflow-y: auto;
      display: none;
    }
    .case-title {
      font-size: 12px;
      font-weight: bold;
      color: #1a3c5e;
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid #eee;
    }
    .doc-item {
      font-size: 11px;
      padding: 3px 0;
      border-bottom: 1px dashed #f0f0f0;
      color: #444;
    }
    .doc-item:last-child { border-bottom: none; }
    .doc-item::before { content: "📄 "; }

    /* 进度条 */
    #progressWrap {
      display: none;
      margin-bottom: 8px;
    }
    #progressBar {
      width: 100%;
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
    }
    #progressFill {
      height: 100%;
      background: #2e7d32;
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s;
    }
    #progressText {
      font-size: 10px;
      color: #888;
      text-align: right;
      margin-top: 2px;
    }

    /* 按钮 */
    button {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-family: "微软雅黑", sans-serif;
      font-weight: bold;
      margin-bottom: 6px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #btnDown { background: #2e7d32; color: #fff; display: none; }
    #btnDown:hover:not(:disabled) { background: #1b5e20; }
  </style>
</head>
<body>
  <h3>⚖ 上海法院文书一键下载</h3>

  <!-- 状态提示 -->
  <div id="statusBox">
    <span id="statusIcon">🔍</span>
    <span id="statusText">正在识别当前页面...</span>
  </div>

  <!-- 文书列表预览 -->
  <div id="docList"></div>

  <!-- 进度条 -->
  <div id="progressWrap">
    <div id="progressBar"><div id="progressFill"></div></div>
    <div id="progressText"></div>
  </div>

  <!-- 下载按钮 -->
  <button id="btnDown">⬇ 一键下载全部文书</button>

  <script src="popup.js"></script>
</body>
</html>
